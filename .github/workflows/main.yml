name: Ferry Status Sync

on:
  workflow_dispatch:

  schedule:
    - cron: '20 20 * * *'
    - cron: '40 20 * * *'
    - cron: '0 21 * * *'
    - cron: '20 21 * * *'
    - cron: '40 21 * * *'
    - cron: '50 1 * * *'
    - cron: '10 2 * * *'
    - cron: '30 2 * * *'
    - cron: '50 2 * * *'

concurrency:
  group: ferry-status-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BUBBLE_BASE_URL: https://schedules.jp/api/1.1/wf
      FERRY_SAILING_CSV: data/FerrySailing_COMPLETE_FINAL_with_conditions_corrected.csv
      WF_NAME: receive_ferry_status

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run script
        run: python scripts/fetch_ferry_status.py
