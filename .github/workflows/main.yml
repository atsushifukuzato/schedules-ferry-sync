name: Ferry Status Sync

on:
  workflow_dispatch:

  schedule:
    - cron: '0 21 * * *'   # 06:00 JST
    - cron: '5 22 * * *'   # 07:05 JST
    - cron: '5 4 * * *'    # 13:05 JST

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python scripts/fetch_ferry_status.py
