name: Ferry Status Sync

on:
  workflow_dispatch:

concurrency:
  group: ferry-status-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BUBBLE_BASE_URL: ${{ secrets.BUBBLE_BASE_URL }}
      BUBBLE_API_TOKEN: ${{ secrets.BUBBLE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug env presence
        run: |
          if [ -z "$BUBBLE_BASE_URL" ]; then
            echo "BUBBLE_BASE_URL is empty"
            exit 1
          else
            echo "BUBBLE_BASE_URL is set"
          fi

          if [ -z "$BUBBLE_API_TOKEN" ]; then
            echo "BUBBLE_API_TOKEN is empty"
            exit 1
          else
            echo "BUBBLE_API_TOKEN is set"
          fi

      - name: Run script
        run: python scripts/fetch_ferry_status.py
