name: Ferry Status Sync

on:
  workflow_dispatch:

concurrency:
  group: ferry-status-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BUBBLE_BASE_URL: https://schedules.jp/api/1.1/wf
      FERRY_SAILING_CSV: data/FerrySailing_COMPLETE_FINAL_with_conditions_corrected.csv
      WF_NAME: receive_ferry_status
      FERRY_SECRET: ${{ secrets.FERRY_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Debug env
        run: |
          echo "Checking environment..."

          if [ -z "$BUBBLE_BASE_URL" ]; then
            echo "BUBBLE_BASE_URL is empty"
            exit 1
          else
            echo "BUBBLE_BASE_URL OK"
          fi

          if [ -z "$FERRY_SECRET" ]; then
            echo "FERRY_SECRET is empty"
            exit 1
          else
            echo "FERRY_SECRET OK"
          fi

          if [ ! -f "$FERRY_SAILING_CSV" ]; then
            echo "CSV not found: $FERRY_SAILING_CSV"
            exit 1
          else
            echo "CSV found"
          fi

      - name: Run ferry sync
        run: python scripts/fetch_ferry_status.py
