name: Ferry Status Sync

on:
  workflow_dispatch:

concurrency:
  group: ferry-status-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BUBBLE_BASE_URL: https://schedules.jp/api/1.1/wf
      WF_NAME: receive_ferry_status

      FERRY_SAILING_CSV: data/FerrySailing_COMPLETE_FINAL_with_conditions_corrected.csv
      FERRY_ROUTE_CSV: data/FerryRoute_with_import_key.csv

      FERRY_SECRET: ${{ secrets.FERRY_SECRET }}

      # pending 判定
      FERRY_PENDING_KEYWORDS: "未定,調整中,条件付,条件付き,一部欠航,運航可否確認中,見合わせ,一部運休,変更"

      REQUEST_RETRIES: "3"
      REQUEST_DELAY_SEC: "3"
      YKF_SSL_VERIFY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          echo "===== CURRENT DIR ====="
          pwd
          echo "===== ROOT ====="
          ls -la
          echo "===== DATA ====="
          ls -la data || true
          echo "===== ENV ====="
          echo "FERRY_SAILING_CSV=$FERRY_SAILING_CSV"
          echo "FERRY_ROUTE_CSV=$FERRY_ROUTE_CSV"

      - name: Check files
        run: |
          test -f "$FERRY_SAILING_CSV"
          test -f "$FERRY_ROUTE_CSV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      - name: Run ferry sync
        run: python scripts/fetch_ferry_status.py
