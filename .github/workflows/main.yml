name: Ferry Status Sync

on:
  workflow_dispatch:

  schedule:
    # 朝の運航状況
    - cron: '20 20 * * *'  # 05:20 JST
    - cron: '40 20 * * *'  # 05:40 JST
    - cron: '0 21 * * *'   # 06:00 JST
    - cron: '20 21 * * *'  # 06:20 JST
    - cron: '40 21 * * *'  # 06:40 JST

    # 波照間などの追加確認
    - cron: '50 1 * * *'   # 10:50 JST
    - cron: '10 2 * * *'   # 11:10 JST
    - cron: '30 2 * * *'   # 11:30 JST
    - cron: '50 2 * * *'   # 11:50 JST

concurrency:
  group: ferry-status-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BUBBLE_BASE_URL: https://schedules.jp/api/1.1/wf
      FERRY_SAILING_CSV: data/FerrySailing_COMPLETE_FINAL_with_conditions_corrected.csv
      FERRY_ROUTE_CSV: data/FerryRoute_with_import_key.csv
      WF_NAME: receive_ferry_status
      FERRY_SECRET: ${{ secrets.FERRY_SECRET }}

      # 必要になったらここに追加
      # 例: "未定,調整中,条件付,条件付き,一部欠航,運航可否確認中,見合わせ,一部運休,変更"
      FERRY_PENDING_KEYWORDS: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Check files
        run: |
          test -f "$FERRY_SAILING_CSV"
          test -f "$FERRY_ROUTE_CSV"

      - name: Run ferry sync
        run: python scripts/fetch_ferry_status.py
