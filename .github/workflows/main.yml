name: Ferry Status Sync

on:
  workflow_dispatch:

  schedule:
    - cron: '35 20 * * *'
    - cron: '5 22 * * *'
    - cron: '5 1 * * *'
    - cron: '5 4 * * *'
    - cron: '5 7 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python scripts/fetch_ferry_status.py
